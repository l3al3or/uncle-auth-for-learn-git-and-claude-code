{% extends "base.html" %}
{% block title %}สมัครสมาชิก{% endblock %}
{% block content %}
  <h1>สมัครสมาชิก</h1>
  <form method="post">
    <input name="username" placeholder="ชื่อผู้ใช้" autofocus>
    <input name="password" type="password" placeholder="รหัสผ่าน">
    <button type="submit">สมัครสมาชิก</button>
  </form>
  <p>มีบัญชีแล้ว? <a href="{{ url_for('login') }}">เข้าสู่ระบบ</a></p>
{% endblock %}
